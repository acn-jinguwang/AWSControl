name: Deploy MCP Server to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'aws_infra_mcp_server.py'
      - 'ec2_cloudformation.yaml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy MCP server to EC2
        run: |
          scp -i ~/.ssh/deploy_key \
            aws_infra_mcp_server.py \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/mcp/aws_infra_mcp_server.py"

      - name: Restart MCP service
        run: |
          ssh -i ~/.ssh/deploy_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "sudo systemctl restart mcp-aws && sleep 3 && sudo systemctl status mcp-aws --no-pager && echo '=== Deploy completed at $(date) ==='"
